<script>
'use strict';
/* ================= VIZ 8: 3D PARTICLE FIELD ================= */
function idPhase(id){ // deterministic per-node phase offsets
  let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))|0;
  return [(h&1023)/1023*6.283, ((h>>10)&1023)/1023*6.283, ((h>>20)&1023)/1023*6.283];
}
function makeField3D(){
  let yaw=0.4, R=300, zoom=1;
  const pitch=0.42;
  const viz={
    name:'PARTICLE FIELD 3D',
    prepare:function(dt){
      if(!S.paused) yaw += dt*0.05*speedMult(); // slow cinematic drift-rotation
      let m=1;
      for(const n of S.nodes){ const d=Math.hypot(n.x,n.y,n.z); if(d>m) m=d; }
      R=m;
    },
    worldPos:function(id){
      const p=POS.get(id); if(!p) return null;
      const ph=idPhase(id), t=S.time;
      // slow per-particle drift makes the cloud feel alive
      return [ p[0]+Math.sin(t*0.31+ph[0])*16, p[1]+Math.cos(t*0.23+ph[1])*16, p[2]+Math.sin(t*0.27+ph[2])*16 ];
    },
    project:function(x,y,z){
      const base=(Math.min(S.view.w,S.view.h)/2.5)/Math.max(R,1)*zoom;
      const cy=Math.cos(yaw), sy=Math.sin(yaw), cp=Math.cos(pitch), sp=Math.sin(pitch);
      const x1=x*cy+z*sy, z1=-x*sy+z*cy;
      const y1=y*cp-z1*sp, z2=y*sp+z1*cp;
      const fov=3.0, s=fov/(fov+z2*base/140);
      const depth=clamp(1.1-(z2*base/140+2.2)/4.4, 0.06, 1); // fog
      return [S.view.w/2+x1*base*s*0.95, S.view.h/2+y1*base*s*0.95, clamp(s,0.2,2.4), depth];
    },
    drawEdges:function(){
      ctx.lineWidth=1;
      ctx.strokeStyle='rgba(66,248,255,.045)';
      ctx.beginPath();
      for(const e of S.edges){
        const a=viz.worldPos(e.src), b=viz.worldPos(e.dst); if(!a||!b) continue;
        const pa=viz.project(a[0],a[1],a[2]), pb=viz.project(b[0],b[1],b[2]);
        ctx.moveTo(pa[0],pa[1]); ctx.lineTo(pb[0],pb[1]);
      }
      ctx.stroke();
    },
    edgePoint:function(e,t){ return straightEdgePoint(viz,e,t); },
    drawScene:function(){
      viz.drawEdges();
      // additive glow pass: nodes + particles as light emitters with fog depth
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      for(const n of S.nodes){
        const w=viz.worldPos(n.id); if(!w) continue;
        const pt=viz.project(w[0],w[1],w[2]); if(!pt) continue;
        const sx=pt[0], sy=pt[1], sc=pt[2], al=pt[3];
        if(sx<-40||sy<-40||sx>S.view.w+40||sy>S.view.h+40) continue;
        const r=clamp((4.5+degreeOf(n.id)*0.25)*sc,2,18);
        drawGlow(sx,sy,r,kindColor(n.kind),0.55*al);
        S.screen.set(n.id,{x:sx,y:sy,r:Math.max(r*0.6,7)});
      }
      drawParticles(viz);
      ctx.restore();
    },
    onWheel:function(d){ zoom=clamp(zoom*(d>0?0.9:1.12),0.3,4); }
  };
  return viz;
}

/* ================= VIZ 9: 4D FRAME SCANNER ================= */
/* FS holds the time-slider playhead, ghost trails and event markers.
   Purpose: let humans & AI see where things are and how they move over time. */
const FS = {
  ft: 0,             // fractional frame index (playhead)
  slowed: false,     // per-viz extra 10x slow ("slowed objects")
  scrubbing: false,
  trails: new Map(), // id -> [{x,y}]
  TRAILK: 10,
  lastFrameInt: -1,
  onFrames: function(){
    const n=S.frames.length;
    const sl=$('#fslider'); if(sl) sl.max=Math.max(0,n-1);
    if(this.ft>n-1) this.ft=Math.max(0,n-1);
    // event markers on the timeline (from frame-embedded events)
    const fm=$('#fmarks'); if(!fm) return;
    fm.innerHTML='';
    if(n>1){
      S.frames.forEach(function(fr,i){
        if(fr && Array.isArray(fr.events) && fr.events.length){
          const d=el('div','mark');
          d.style.left=(i/(n-1)*100)+'%';
          fm.appendChild(d);
        }
      });
    }
  },
  onEvent: function(){ /* live flows also nudge the boost system; markers come from frames */ },
  frameAt: function(i){
    i=clamp(i,0,S.frames.length-1);
    return S.frames[i]||null;
  }
};
$('#fslider').addEventListener('input', function(){ FS.ft=parseFloat(this.value)||0; FS.scrubbing=true; });
$('#fslider').addEventListener('change', function(){ FS.scrubbing=false; });
$('#fslow').addEventListener('change', function(){ FS.slowed=this.checked; });

function makeFrameScanner(){
  let R=300;
  const yaw=0.75, pitch=0.38;
  function posAt(id, fi, frac){
    const f0=FS.frameAt(fi), f1=FS.frameAt(Math.min(fi+1,S.frames.length-1));
    const p0=f0&&f0.positions?f0.positions[id]:null;
    const p1=f1&&f1.positions?f1.positions[id]:null;
    if(p0&&p1) return [lerp(p0[0],p1[0],frac), lerp(p0[1],p1[1],frac), lerp(p0[2]||0,p1[2]||0,frac)];
    if(p0) return [p0[0],p0[1],p0[2]||0];
    const d=POS.get(id); // node absent from frames → sit at current viz-data coords
    return d?[d[0],d[1],d[2]]:null;
  }
  const viz={
    name:'4D FRAME SCANNER',
    prepare:function(dt){
      const n=S.frames.length;
      // advance playhead at the global speed (extra 10x slow when "slowed objects" is on)
      if(!S.paused && !FS.scrubbing && n>1){
        FS.ft += dt*1.6*speedMult()*(FS.slowed?0.1:1);
        if(FS.ft>=n-1) FS.ft=0; // loop the tape
      }
      if(n<1) FS.ft=0;
      FS.ft=clamp(FS.ft,0,Math.max(0,n-1));
      // frame-crossing: fire events embedded in the newly entered frame
      const fi=Math.floor(FS.ft);
      if(fi!==FS.lastFrameInt){
        FS.lastFrameInt=fi;
        const fr=FS.frameAt(fi);
        if(fr&&Array.isArray(fr.events)){
          for(const ev of fr.events.slice(0,12)) flowBoost(ev);
        }
      }
      let m=1;
      for(const nd of S.nodes){ const d=Math.hypot(nd.x,nd.y,nd.z); if(d>m) m=d; }
      R=m;
      // sync the DOM slider + readout
      const sl=$('#fslider');
      if(sl && !FS.scrubbing) sl.value=FS.ft;
      const fr=$('#fread'); if(fr) fr.textContent='f '+FS.ft.toFixed(1)+'/'+Math.max(0,n-1)+'  '+viz.frameReadout();
    },
    worldPos:function(id){
      if(!S.frames.length){ const p=POS.get(id); return p?[p[0],p[1],p[2]]:null; }
      const fi=Math.floor(FS.ft), frac=FS.ft-fi;
      return posAt(id,fi,frac);
    },
    project:function(x,y,z){
      const base=(Math.min(S.view.w,S.view.h)/2.45)/Math.max(R,1);
      const cy=Math.cos(yaw), sy=Math.sin(yaw), cp=Math.cos(pitch), sp=Math.sin(pitch);
      const x1=x*cy+z*sy, z1=-x*sy+z*cy;
      const y1=y*cp-z1*sp, z2=y*sp+z1*cp;
      const fov=3.2, s=fov/(fov+z2*base/140);
      return [S.view.w/2+x1*base*s*0.95, S.view.h/2+y1*base*s*0.95, clamp(s,0.25,2.4), 1];
    },
    edgePoint:function(e,t){ return straightEdgePoint(viz,e,t); },
    drawExtras:function(){
      // ghost trails: last K projected positions, fading
      for(const n of S.nodes){
        const w=viz.worldPos(n.id); if(!w) continue;
        const pt=viz.project(w[0],w[1],w[2]); if(!pt) continue;
        let tr=FS.trails.get(n.id);
        if(!tr){ tr=[]; FS.trails.set(n.id,tr); }
        tr.push({x:pt[0],y:pt[1]});
        if(tr.length>FS.TRAILK) tr.shift();
        const col=kindColor(n.kind);
        for(let i=0;i<tr.length-1;i++){
          const a=(i+1)/tr.length*0.30;
          ctx.strokeStyle=hexA(col,a);
          ctx.beginPath(); ctx.moveTo(tr[i].x,tr[i].y); ctx.lineTo(tr[i+1].x,tr[i+1].y); ctx.stroke();
        }
      }
      // prune trails for removed nodes
      if(FS.trails.size>S.nodes.length*2+50){
        const ids=new Set(S.nodes.map(n=>n.id));
        for(const k of Array.from(FS.trails.keys())) if(!ids.has(k)) FS.trails.delete(k);
      }
      if(!S.frames.length){
        ctx.fillStyle='rgba(255,212,71,.8)'; ctx.font='12px "Courier New",monospace'; ctx.textAlign='center';
        ctx.fillText('NO FRAMES IN viz-data — showing live positions', S.view.w/2, 40);
        ctx.textAlign='left';
      }
    },
    frameReadout:function(){
      const n=S.frames.length; if(!n) return '';
      const fi=Math.floor(FS.ft), frac=FS.ft-fi;
      const f0=FS.frameAt(fi), f1=FS.frameAt(Math.min(fi+1,n-1));
      const t0=f0&&f0.t!=null?(+f0.t):fi, t1=f1&&f1.t!=null?(+f1.t):t0;
      return 't='+fmtTs(lerp(t0,t1,frac));
    }
  };
  return viz;
}

/* ================= VIZ 10: AI LATENT PROJECTION ================= */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }
function dotv(a,b){ let s=0; for(let i=0;i<a.length;i++) s+=a[i]*b[i]; return s; }
function convexHull(points){
  if(points.length<3) return points.slice();
  const pts=points.slice().sort(function(a,b){ return a[0]-b[0]||a[1]-b[1]; });
  const cross=function(o,a,b){ return (a[0]-o[0])*(b[1]-o[1])-(a[1]-o[1])*(b[0]-o[0]); };
  const lower=[]; for(const p of pts){ while(lower.length>=2&&cross(lower[lower.length-2],lower[lower.length-1],p)<=0) lower.pop(); lower.push(p); }
  const upper=[]; for(let i=pts.length-1;i>=0;i--){ const p=pts[i]; while(upper.length>=2&&cross(upper[upper.length-2],upper[upper.length-1],p)<=0) upper.pop(); upper.push(p); }
  lower.pop(); upper.pop(); return lower.concat(upper);
}
function makeLatent(){
  const pool=new LerpPool();
  let ver=-1, kinds=[], fit={cx:0,cy:0,sc:1};
  function rebuild(){
    ver=S.version;
    // feature vector per node: kind one-hot over top kinds + log-degree + severity
    const counts=new Map();
    for(const n of S.nodes) counts.set(n.kind,(counts.get(n.kind)||0)+1);
    kinds=Array.from(counts.entries()).sort(function(a,b){ return b[1]-a[1]; }).slice(0,8).map(function(x){ return x[0]; });
    const kidx=new Map(kinds.map(function(k,i){ return [k,i]; }));
    const D=kinds.length+2;
    const X=S.nodes.map(function(n){
      const v=new Array(D).fill(0);
      const ki=kidx.get(n.kind); if(ki!=null) v[ki]=1;
      v[D-2]=Math.log(1+degreeOf(n.id))/Math.log(25);
      v[D-1]=sevScore(n.severity);
      return v;
    });
    // center the design matrix
    const mean=new Array(D).fill(0);
    for(const v of X) for(let d=0;d<D;d++) mean[d]+=v[d];
    const inv=1/Math.max(1,X.length);
    for(let d=0;d<D;d++) mean[d]*=inv;
    for(const v of X) for(let d=0;d<D;d++) v[d]-=mean[d];
    // fixed random projection seeds the two components…
    const rnd=mulberry32(1337);
    const R=Array.from({length:D},function(){ return [rnd()*2-1, rnd()*2-1]; });
    function matVec(v){ // covariance application C·v = Xᵀ(X·v) without forming C
      const xv=X.map(function(row){ return dotv(row,v); });
      const out=new Array(D).fill(0);
      for(let i=0;i<X.length;i++){ const s=xv[i], row=X[i]; for(let d=0;d<D;d++) out[d]+=row[d]*s; }
      return out;
    }
    function powerIter(seed,ortho){ // 60 iterations of power-iteration PCA refinement
      let v=seed.slice();
      for(let it=0;it<60;it++){
        if(ortho){ const o=dotv(v,ortho); for(let d=0;d<D;d++) v[d]-=o*ortho[d]; }
        const w=matVec(v);
        let nrm=0; for(const x of w) nrm+=x*x; nrm=Math.sqrt(nrm)||1;
        for(let d=0;d<D;d++) v[d]=w[d]/nrm;
      }
      return v;
    }
    const pc1=powerIter(R.map(function(r){ return r[0]; }),null);
    const pc2=powerIter(R.map(function(r){ return r[1]; }),pc1);
    const out=new Map();
    let minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;
    S.nodes.forEach(function(n,i){
      const c=[dotv(X[i],pc1), dotv(X[i],pc2)];
      out.set(n.id,[c[0],c[1],0]);
      if(c[0]<minx)minx=c[0]; if(c[0]>maxx)maxx=c[0];
      if(c[1]<miny)miny=c[1]; if(c[1]>maxy)maxy=c[1];
    });
    pool.setTargets(out,false);
    fit={ cx:(minx+maxx)/2||0, cy:(miny+maxy)/2||0,
          sc:Math.min((S.view.w-140)/Math.max(1e-6,maxx-minx),(S.view.h-140)/Math.max(1e-6,maxy-miny)) };
    if(!isFinite(fit.sc)||fit.sc<=0) fit.sc=1;
  }
  const viz={
    name:'AI LATENT PROJECTION',
    prepare:function(dt){ if(ver!==S.version) rebuild(); pool.tick(dt); },
    worldPos:function(id){ return pool.get(id); },
    project:function(x,y){
      return [S.view.w/2+(x-fit.cx)*fit.sc, S.view.h/2+(y-fit.cy)*fit.sc, 0.95, 1];
    },
    drawEdges:function(){
      ctx.lineWidth=1;
      for(const e of S.edges){
        const a=viz.worldPos(e.src), b=viz.worldPos(e.dst); if(!a||!b) continue;
        const pa=viz.project(a[0],a[1],0), pb=viz.project(b[0],b[1],0);
        ctx.strokeStyle=hexA(kindColor(e.kind),0.05);
        ctx.beginPath(); ctx.moveTo(pa[0],pa[1]); ctx.lineTo(pb[0],pb[1]); ctx.stroke();
      }
    },
    edgePoint:function(e,t){ return straightEdgePoint(viz,e,t); },
    drawExtras:function(){
      // convex-hull-ish cluster outlines + labels per top kind
      ctx.font='10px "Courier New",monospace'; ctx.textAlign='center';
      for(const k of kinds){
        const pts=[];
        for(const n of S.nodes){
          if(n.kind!==k) continue;
          const w=viz.worldPos(n.id); if(!w) continue;
          const p=viz.project(w[0],w[1],0);
          pts.push([p[0],p[1]]);
          if(pts.length>=240) break;
        }
        if(pts.length<3) continue;
        const hull=convexHull(pts);
        let cx=0,cy=0; for(const p of pts){ cx+=p[0]; cy+=p[1]; }
        cx/=pts.length; cy/=pts.length;
        ctx.strokeStyle=hexA(kindColor(k),0.4);
        ctx.fillStyle=hexA(kindColor(k),0.05);
        ctx.beginPath();
        hull.forEach(function(p,i){ if(i===0) ctx.moveTo(p[0],p[1]); else ctx.lineTo(p[0],p[1]); });
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle=kindColor(k);
        ctx.fillText(k.slice(0,16).toUpperCase(), cx, cy);
      }
      ctx.textAlign='left';
    }
  };
  return viz;
}
</script>
<script>
'use strict';
/* ================= VIZ REGISTRY + SWITCHER ================= */
const VIZ=[ makeForce2D(), makeForce3D(), makeRadial(), makeHeatmap(), makeMatrix(),
            makeHive(), makeArc(), makeField3D(), makeFrameScanner(), makeLatent() ];
const VIZ_SHORT=['2D FORCE','3D FORCE','RADIAL TREE','HEATMAP','MATRIX','HIVE PLOT','ARC DIAGRAM','FIELD 3D','4D SCAN','AI LATENT'];
function buildVizBar(){
  const bar=$('#vizbar');
  const lab=el('span',null,'VIZ //'); lab.style.cssText='color:var(--mag);font-size:10px;letter-spacing:2px;text-shadow:0 0 7px rgba(255,43,214,.6);';
  bar.appendChild(lab);
  VIZ.forEach(function(v,i){

}
function switchViz(i){

  $('#vizopts').classList.toggle('show', VIZ[i].name==='4D FRAME SCANNER');
  syslog('viz → '+VIZ[i].name,'inf');
}

/* ================= MOUSE: hover tooltip / click inspect / drag / orbit / zoom ================= */
const tip=$('#tip');
function evPos(e){ const r=cv.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; }
function currentHit(x,y){
  const viz=VIZ[S.viz];
  if(viz.hit) return viz.hit(x,y);
  return hitTestNodes(x,y);
}
function updateTip(x,y,hit){
  let html='';
  if(hit){
    if(hit.type==='node'){
      const n=S.nodeById.get(hit.id);
      if(n){
        html='<div class="tl">'+esc(n.label)+'</div>'+
             '<div><span class="tk">'+esc(n.kind)+'</span> · deg '+degreeOf(n.id)+
             (n.severity!=null?' · sev '+esc(String(n.severity)):'')+'</div>'+
             '<div class="td">'+esc(n.id)+'</div>';
      }
    } else if(hit.type==='cell'){
      const c=hit.cell;
      if(c.type==='heat') html='<div class="tl">'+esc(c.kind)+' / '+esc(c.bucket)+'</div><div class="td">'+c.ids.length+' nodes — click to list</div>';
      else if(c.type==='mcell' && c.edges && c.edges.length){
        const e0=c.edges[0];
        html='<div class="tl">'+esc(e0.src)+' ↔ '+esc(e0.dst)+'</div><div class="td">'+c.edges.length+' edge(s) — click for detail</div>';
      }

  if(!html){ tip.style.display='none'; S.hover=null; return; }
  S.hover=hit;
  tip.innerHTML=html;
  tip.style.display='block';
  tip.style.left=clamp(x+14,2,S.view.w-190)+'px';
  tip.style.top=clamp(y+12,2,S.view.h-70)+'px';
}
let drag=false, dragMoved=false, downX=0, downY=0, lastX=0, lastY=0;
cv.addEventListener('mousedown', function(e){
  const p=evPos(e); downX=p[0]; downY=p[1]; lastX=p[0]; lastY=p[1]; dragMoved=false;

});
window.addEventListener('mousemove', function(e){
  const p=evPos(e);
  const viz=VIZ[S.viz];
  if(drag){
    const dx=p[0]-lastX, dy=p[1]-lastY;
    if(Math.abs(p[0]-downX)+Math.abs(p[1]-downY)>4) dragMoved=true;
    if(viz.onMove) viz.onMove(p[0],p[1],dx,dy);
  } else if(p[0]>=0&&p[1]>=0&&p[0]<=S.view.w&&p[1]<=S.view.h){
    const hit=currentHit(p[0],p[1]);
    updateTip(p[0],p[1],hit);
    cv.style.cursor=hit?'pointer':'crosshair';
  } else {
    tip.style.display='none';
  }
  lastX=p[0]; lastY=p[1];
});
window.addEventListener('mouseup', function(e){
  const viz=VIZ[S.viz];
  if(drag && viz.onUp) viz.onUp();
  drag=false;
  if(dragMoved) return;
  const p=evPos(e);
  if(p[0]<0||p[1]<0||p[0]>S.view.w||p[1]>S.view.h) return;
  const hit=currentHit(p[0],p[1]);
  if(!hit) return;
  if(hit.type==='node') selectNode(hit.id);
  else if(hit.type==='cell' && viz.onCell) viz.onCell(hit.cell);
});
cv.addEventListener('wheel', function(e){
  const viz=VIZ[S.viz];
  if(viz.onWheel){ e.preventDefault(); viz.onWheel(e.deltaY); }
}, {passive:false});

/* ================= MAIN RENDER LOOP ================= */
function render(dt){
  const viz=VIZ[S.viz];
  ctx.clearRect(0,0,S.view.w,S.view.h);
  S.screen.clear(); S.cells.length=0;
  try{ viz.prepare(dt); }catch(e){ /* a viz must never kill the loop */ }
  try{
    if(viz.drawScene){ viz.drawScene(); }
    else{
      if(viz.drawEdges) viz.drawEdges(viz); else drawEdgesDefault(viz);
      drawParticles(viz);
      if(!viz.drawNodesSkip) drawNodesDefault(viz);
      if(viz.drawExtras) viz.drawExtras();
    }
  }catch(e){}
  try{ drawFlash(viz); }catch(e){}
  try{ drawLegend(); }catch(e){}
  updateReadout(viz);
}
let lastT=performance.now();
function frame(now){
  const rawDt=clamp((now-lastT)/1000,0,0.05); lastT=now;
  const dt=S.paused?0:rawDt;
  if(!S.paused) S.time+=rawDt;
  PS.update(dt);
  POS.tick(dt);
  render(dt);
  requestAnimationFrame(frame);
}

/* ================= BOOT ================= */
function boot(){
  buildVizBar();
  resizeCanvas();
  syslog('SSB BEAST GODSCOPE online — 10 viz armed','ok');
  syslog('polling: health 1s · viz-data 2s · process-flow 1s','inf');
  requestAnimationFrame(frame);
  // immediate first hits, then steady pollers
  pollHealth(); pollViz(); pollFlows();
  loadTreeRoot(); loadEndpoints();
  setInterval(pollHealth,1000);
  setInterval(pollViz,2000);
  setInterval(pollFlows,1000);
}
boot();
</script>
<script>
'use strict';
/* ================= MESSAGING + LIVE API (v12 additive) ================= */
(function(){
  /* ---- LIVE API feed strip ---- */
  const apilog = document.getElementById('apilog');
  const apicount = document.getElementById('c-apicount');
  const seenApi = new Set();
  function apiRow(f){
    const key = [f.ts,f.path,f.latency_ms,f.prompt_preview].join('|');
    if(seenApi.has(key)) return;
    seenApi.add(key);
    if(seenApi.size > 600){ const first = seenApi.values().next().value; seenApi.delete(first); }
    const row = document.createElement('div');
    const ok = f.ok ? '<span style="color:#7dffca">✔</span>' : '<span style="color:#ff1765">✘</span>';
    const t = new Date((f.ts||0)*1000).toLocaleTimeString();
    row.innerHTML = ok + ' <span style="color:#42f8ff">' + t + '</span> ' +
      '<span style="color:#ff2bd6">' + (f.path||'') + '</span> ' +
      '<span style="color:#ffd447">' + (f.model||'') + '</span> via ' + (f.provider_used||'?') +
      ' <span style="color:#7a8694">' + (f.latency_ms||0) + 'ms — ' + (f.prompt_preview||'').replace(/</g,'&lt;') + '</span>';
    apilog.insertBefore(row, apilog.firstChild);
    while(apilog.children.length > 200) apilog.removeChild(apilog.lastChild);
  }
  async function pollApiFeed(){
    try{
      const r = await fetch('/beast/api/messaging/feed?limit=100');
      const d = await r.json();
      (d.flows||[]).slice().reverse().forEach(apiRow);
      apicount.textContent = (d.count||0) + ' calls';
    }catch(e){ /* degrade silently */ }
  }
  document.getElementById('b-apiclear').addEventListener('click', function(){ apilog.innerHTML=''; seenApi.clear(); });
  setInterval(pollApiFeed, 2000); pollApiFeed();

  /* ---- MESSAGES modal ---- */
  function field(label, value, id){
    const w = document.createElement('div'); w.style.margin='6px 0';
    const l = document.createElement('div'); l.textContent = label; l.style.cssText='color:#7a8694;font-size:9px;letter-spacing:1px;';
    const i = document.createElement('input'); i.id=id; i.value=value;
    i.style.cssText='width:100%;background:#05080c;border:1px solid #1d3a45;color:#d5f7ff;padding:4px 6px;font-size:11px;font-family:inherit;';
    w.appendChild(l); w.appendChild(i); return {wrap:w, input:i};
  }
  function openMessages(){
    const box = document.createElement('div');
    const sys = field('SYSTEM', 'You are the SSB Beast.', 'm-sys');
    const mdl = field('MODEL', 'kimi-for-coding', 'm-model');
    const ta = document.createElement('textarea'); ta.id='m-text'; ta.rows=3; ta.placeholder='message clauses (user)… Ctrl+Enter to send';
    ta.style.cssText='width:100%;background:#05080c;border:1px solid #1d3a45;color:#d5f7ff;padding:6px;font-size:11px;font-family:inherit;';
    const convo = document.createElement('div'); convo.id='m-convo';
    convo.style.cssText='max-height:300px;overflow-y:auto;border:1px solid #123;padding:6px;margin:8px 0;font-size:11px;';
    const sendBtn = document.createElement('button'); sendBtn.className='btn'; sendBtn.textContent='SEND /v1/messages';
    const ocM = document.createElement('button'); ocM.className='btn'; ocM.textContent='OPENCLAW METHODS';
    const heM = document.createElement('button'); heM.className='btn'; heM.textContent='HERMES METHODS';
    const ocC = document.createElement('button'); ocC.className='btn'; ocC.textContent='OPENCLAW CALL';
    const heC = document.createElement('button'); heC.className='btn'; heC.textContent='HERMES CALL';
    const btnRow = document.createElement('div'); btnRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin:6px 0;';
    [sendBtn,ocM,heM,ocC,heC].forEach(b=>btnRow.appendChild(b));
    function addMsg(role, text, meta){
      const d = document.createElement('div');
      d.style.cssText='margin:6px 0;padding:5px;border-left:2px solid '+(role==='user'?'#42f8ff':'#ff2bd6')+';';
      d.innerHTML = '<div style="color:#7a8694;font-size:9px;">'+role.toUpperCase()+(meta?' · '+meta:'')+'</div>'+
                    '<div style="white-space:pre-wrap;color:#d5f7ff;">'+String(text).replace(/</g,'&lt;')+'</div>';
      convo.appendChild(d); convo.scrollTop = convo.scrollHeight;
    }
    async function send(){
      const text = ta.value.trim(); if(!text) return;
      addMsg('user', text); ta.value='';
      try{
        const r = await fetch('/v1/messages', {method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({model: mdl.input.value, system: sys.input.value,
            messages:[{role:'user', content:text}], max_tokens:512})});
        const d = await r.json();
        const blocks = (d.content||[]).map(b=>b.text||'').join('\n') || JSON.stringify(d);
        const u = d.usage ? ('in '+d.usage.input_tokens+' / out '+d.usage.output_tokens) : '';
        addMsg('assistant', blocks, (d['x-ssb-provider']||'')+' · '+(d.model||'')+' '+u);
      }catch(e){ addMsg('assistant', 'send failed: '+e.message); }
    }
    sendBtn.addEventListener('click', send);
    ta.addEventListener('keydown', e=>{ if(e.ctrlKey && e.key==='Enter') send(); });
    async function methods(side){
      try{ const r = await fetch('/beast/api/'+side+'/methods'); const d = await r.json();
        addMsg('assistant', JSON.stringify(d,null,1).slice(0,3000), side+' methods');
      }catch(e){ addMsg('assistant', side+' methods failed: '+e.message); }
    }
    async function call(side){
      const text = ta.value.trim() || 'ping';
      try{ const r = await fetch('/beast/api/'+side+'/call', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({prompt:text})});
        const d = await r.json();
        addMsg('assistant', 'request_id: '+(d.request_id||'—')+'\nmode: '+(d.mode||'—')+'\n'+(d.text||d.error||''), side+' call');
      }catch(e){ addMsg('assistant', side+' call failed: '+e.message); }
    }
    ocM.addEventListener('click', ()=>methods('openclaw'));
    heM.addEventListener('click', ()=>methods('hermes'));
    ocC.addEventListener('click', ()=>call('openclaw'));
    heC.addEventListener('click', ()=>call('hermes'));
    box.appendChild(sys.wrap); box.appendChild(mdl.wrap); box.appendChild(ta);
    box.appendChild(btnRow); box.appendChild(convo);
    showModal('MESSAGES — Kimi Code / Anthropic-style /v1/messages + OpenClaw/Hermes bridge', box);
  }
  document.getElementById('b-msg').addEventListener('click', openMessages);
})();
</script>
</body>
